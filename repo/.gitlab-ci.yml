stages:
  - review
  - ai-assist
  - post-merge

variables:
  # Override in GitLab CI/CD variables if your runner uses a different model id.
  CLAUDE_MODEL: "claude-sonnet-4-6"
  # Review report language: zh (default, Chinese) or en (English). Set CODE_REVIEW_REPORT_LANGUAGE in CI/CD variables to override per project.
  # Also controls Claude user-facing wording in prompts (claude-assist / update-memory-bank).
  CODE_REVIEW_REPORT_LANGUAGE: "zh"

default:
  before_script:
    - export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
    - export API_URL="${CI_API_V4_URL/https:/http:}"

.review_report_artifacts:
  allow_failure: true
  artifacts:
    when: always
    expire_in: 3 days
    paths:
      - review-report.md

# Level 1: feature/* push — first push: branch_tree (no git-diff range); later: diff_range
feature-review:
  extends: .review_report_artifacts
  stage: review
  timeout: 15 minutes
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\// && $CI_PIPELINE_SOURCE != "trigger"'
  script:
    - |
      which claude >/dev/null 2>&1 || { echo "claude CLI not installed; skipping review"; exit 0; }

      COMMIT_URL="${CI_PROJECT_URL}/commit/${CI_COMMIT_SHA}"
      COMMIT_BEFORE="${CI_COMMIT_BEFORE_SHA:-}"
      # First push: CI_COMMIT_BEFORE_SHA empty or all zeros — review tracked files at HEAD (see ci-code-review SKILL).
      if [ -z "$COMMIT_BEFORE" ] || echo "$COMMIT_BEFORE" | grep -qE '^0+$'; then
        FIRST_PUSH=true
        REVIEW_SCOPE=branch_tree
        DIFF_RANGE=n/a
      else
        FIRST_PUSH=false
        REVIEW_SCOPE=diff_range
        DIFF_RANGE="${COMMIT_BEFORE}..HEAD"
      fi
      {
        echo "review_level: 1"
        echo "first_push: ${FIRST_PUSH}"
        echo "review_scope: ${REVIEW_SCOPE}"
        echo "diff_range: ${DIFF_RANGE}"
        echo "branch: ${CI_COMMIT_BRANCH}"
        echo "review_report_language: ${CODE_REVIEW_REPORT_LANGUAGE:-zh}"
        echo 'ci_code_review: .claude/skills/ci-code-review'
      } | claude --model $CLAUDE_MODEL \
          --allowedTools "Bash Read Grep Glob" \
          -p | tee review-report.md

      if [ -n "$GITLAB_API_TOKEN" ]; then
        COMMENT_BODY=$(printf "<!-- AI_CODE_REVIEW -->\n@%s\n\n%s" "$GITLAB_USER_LOGIN" "$(cat review-report.md)")
        HTTP_CODE=$(curl -sS -w "%{http_code}" -o /tmp/gitlab-response.json \
          --request POST \
          --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
          --data-urlencode "note=${COMMENT_BODY}" \
          "${API_URL}/projects/${CI_PROJECT_ID}/repository/commits/${CI_COMMIT_SHA}/comments")
        [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] && echo "Comment posted" || echo "Failed to post commit comment (HTTP $HTTP_CODE)"
      else
        echo "GITLAB_API_TOKEN not set; skipping commit comment"
      fi

      if [ -n "$FEISHU_APP_ID" ] && [ -n "$FEISHU_APP_SECRET" ]; then
        AUTHOR_EMAIL=$(git log -1 --pretty=format:'%ae' $CI_COMMIT_SHA)
        python3 .gitlab/send-feishu.py review-report.md "Feature Review: $CI_COMMIT_BRANCH" "$COMMIT_URL" "$AUTHOR_EMAIL" || echo "Feishu notification failed"
      else
        echo "FEISHU_APP_ID or FEISHU_APP_SECRET not set; skipping Feishu notification"
      fi

# Level 2: MR targeting integration/* (stdin: review_level / mr_source / mr_target / ci_code_review)
mr-review:
  extends: .review_report_artifacts
  stage: review
  timeout: 20 minutes
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^integration(\/|-)/'
  script:
    - |
      which claude >/dev/null 2>&1 || { echo "claude CLI not installed; skipping review"; exit 0; }

      CURRENT_URL=$(git remote get-url origin)
      git remote set-url origin "${CURRENT_URL/https:/http:}"

      MR_URL="${CI_PROJECT_URL}/merge_requests/${CI_MERGE_REQUEST_IID}"

      git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"

      {
        echo "review_level: 2"
        echo "mr_source: ${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"
        echo "mr_target: ${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}"
        echo "review_report_language: ${CODE_REVIEW_REPORT_LANGUAGE:-zh}"
        echo 'ci_code_review: .claude/skills/ci-code-review'
      } | claude --model $CLAUDE_MODEL \
          --allowedTools "Bash Read Grep Glob" \
          -p | tee review-report.md

      MR_JSON=""
      MR_AUTHOR_USERNAME=""
      if [ -n "$CI_MERGE_REQUEST_IID" ] && [ -n "$GITLAB_API_TOKEN" ]; then
        MR_JSON=$(curl -sS --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
          "${API_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}" 2>/dev/null || true)
        MR_AUTHOR_USERNAME=$(printf '%s' "$MR_JSON" | python3 -c "import sys,json;d=json.load(sys.stdin);print((d.get('author') or {}).get('username') or '')" 2>/dev/null || true)
      fi

      if [ -n "$CI_MERGE_REQUEST_IID" ] && [ -n "$GITLAB_API_TOKEN" ]; then
        if [ -n "$MR_AUTHOR_USERNAME" ]; then
          COMMENT_BODY=$(printf "<!-- AI_CODE_REVIEW -->\n@%s\n\n%s" "$MR_AUTHOR_USERNAME" "$(cat review-report.md)")
        else
          COMMENT_BODY=$(printf "<!-- AI_CODE_REVIEW -->\n\n%s" "$(cat review-report.md)")
        fi
        curl -sS --request POST \
          --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
          --data-urlencode "body=${COMMENT_BODY}" \
          "${API_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes"
      fi

      if [ -n "$FEISHU_APP_ID" ] && [ -n "$FEISHU_APP_SECRET" ]; then
        AUTHOR_EMAIL=""
        if [ -n "$GITLAB_API_TOKEN" ] && [ -n "$CI_MERGE_REQUEST_IID" ]; then
          if [ -z "$MR_JSON" ]; then
            MR_JSON=$(curl -sS --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
              "${API_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}" 2>/dev/null || true)
          fi
          AUTHOR_ID=$(printf '%s' "$MR_JSON" | python3 -c "import sys,json;d=json.load(sys.stdin);print((d.get('author') or {}).get('id') or '')" 2>/dev/null || true)
          if [ -n "$AUTHOR_ID" ]; then
            USER_JSON=$(curl -sS --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
              "${API_URL}/users/${AUTHOR_ID}" 2>/dev/null || true)
            AUTHOR_EMAIL=$(printf '%s' "$USER_JSON" | python3 -c "import sys,json;d=json.load(sys.stdin);print((d.get('public_email') or d.get('email') or '').strip())" 2>/dev/null || true)
          fi
        fi
        if [ -z "$AUTHOR_EMAIL" ]; then
          echo "mr-review: MR author email not available from GitLab API (missing token, empty public_email/email, or API error); falling back to last commit author email" >&2
          AUTHOR_EMAIL=$(git log -1 --pretty=format:'%ae' $CI_COMMIT_SHA)
        else
          echo "mr-review: Feishu notify email resolved from MR author (GitLab user id ${AUTHOR_ID})" >&2
        fi
        python3 .gitlab/send-feishu.py review-report.md "MR Review: !$CI_MERGE_REQUEST_IID" "$MR_URL" "$AUTHOR_EMAIL" || echo "Feishu notification failed"
      fi

# @claude: trigger + AI_FLOW_EVENT=comment
claude-assist:
  allow_failure: true
  stage: ai-assist
  timeout: 20 minutes
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $AI_FLOW_EVENT == "comment"'
  script:
    - |
      which claude >/dev/null 2>&1 || { echo "claude CLI not installed"; exit 1; }
      which jq >/dev/null 2>&1 || { echo "jq not installed"; exit 1; }

      git config user.name "claude"
      git config user.email "claude@users.noreply.${CI_SERVER_HOST:-gitlab}"
      GIT_URL="$(echo "$CI_PROJECT_URL" | sed 's|https://|http://oauth2:'"${GITLAB_API_TOKEN}"'@|;s|http://|http://oauth2:'"${GITLAB_API_TOKEN}"'@|').git"
      git remote set-url origin "$GIT_URL"

      BRANCH="${AI_FLOW_BRANCH}"
      git fetch origin "$BRANCH"
      git checkout "$BRANCH"
      git pull origin "$BRANCH"

      NOTIFY_URL="${AI_FLOW_CONTEXT:-}"
      if [ -z "$NOTIFY_URL" ] && [ -n "$AI_FLOW_MR_IID" ]; then
        NOTIFY_URL="${CI_PROJECT_URL}/merge_requests/${AI_FLOW_MR_IID}"
      elif [ -z "$NOTIFY_URL" ]; then
        NOTIFY_URL="${CI_PROJECT_URL}/commit/${AI_FLOW_COMMIT_SHA}"
      fi

      NOTIFY_EMAIL="${AI_FLOW_AUTHOR_EMAIL:-}"
      NOTIFY_EMAIL_SOURCE=""
      if [ -n "$NOTIFY_EMAIL" ]; then
        NOTIFY_EMAIL_SOURCE="AI_FLOW_AUTHOR_EMAIL"
      else
        NOTIFY_EMAIL="${FEISHU_DEFAULT_NOTIFY_EMAIL:-}"
        if [ -n "$NOTIFY_EMAIL" ]; then
          NOTIFY_EMAIL_SOURCE="FEISHU_DEFAULT_NOTIFY_EMAIL"
        fi
      fi
      if [ -n "$NOTIFY_EMAIL" ]; then
        echo "claude-assist: Feishu NOTIFY_EMAIL source=${NOTIFY_EMAIL_SOURCE} (AI_FLOW_AUTHOR_EMAIL=commenter from webhook/API; FEISHU_DEFAULT_NOTIFY_EMAIL=ops fallback, not commenter identity)" >&2
        echo "claude-assist: Feishu NOTIFY_EMAIL=${NOTIFY_EMAIL}" >&2
      else
        echo "claude-assist: NOTIFY_EMAIL empty — Feishu DMs skipped. Webhook must pass AI_FLOW_AUTHOR_EMAIL (commenter via user.email or GET /users/:id), or set FEISHU_DEFAULT_NOTIFY_EMAIL." >&2
      fi

      REPORT_LANG="${CODE_REVIEW_REPORT_LANGUAGE:-zh}"
      case "$REPORT_LANG" in
        en|en_*|EN*)
          FEISHU_TITLE_PUSHED="Claude Assist: new commit"
          FEISHU_TITLE_OUTPUT_ONLY="Claude Assist: no new commit"
          ;;
        *)
          FEISHU_TITLE_PUSHED="Claude Assist：新增提交"
          FEISHU_TITLE_OUTPUT_ONLY="Claude Assist：未新增提交"
          ;;
      esac

      if [ -n "$AI_FLOW_MR_IID" ]; then
        echo "MR mode: fetching diff and discussions for MR !${AI_FLOW_MR_IID}..."
        MR_INFO=$(curl -sS --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
          "${API_URL}/projects/${CI_PROJECT_ID}/merge_requests/${AI_FLOW_MR_IID}")
        TARGET_BRANCH=$(echo "$MR_INFO" | jq -r '.target_branch')
        SOURCE_BRANCH=$(echo "$MR_INFO" | jq -r '.source_branch')
        echo "  Source: $SOURCE_BRANCH -> Target: $TARGET_BRANCH"
        git fetch origin "$TARGET_BRANCH"
        git diff "origin/$TARGET_BRANCH...HEAD" > /tmp/mr-diff.txt
        echo "MR diff saved to /tmp/mr-diff.txt ($(wc -l < /tmp/mr-diff.txt) lines)"
        DISCUSSIONS=$(curl -sS --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
          "${API_URL}/projects/${CI_PROJECT_ID}/merge_requests/${AI_FLOW_MR_IID}/discussions")
        echo "Classifying MR notes..."
        AI_REVIEWS=$(echo "$DISCUSSIONS" | jq -r '
          .[] | .notes[] | select((.body // "") | contains("<!-- AI_CODE_REVIEW -->"))
          | "- " + .body')
        HUMAN_FEEDBACK=$(echo "$DISCUSSIONS" | jq -r '
          .[] | .notes[] | select((.body // "") | contains("<!-- AI_CODE_REVIEW -->") | not) | select(.body != null and .body != "")
          | "- [" + .author.name + "]: " + .body')
      else
        COMMIT_SHA="${AI_FLOW_COMMIT_SHA}"
        echo "Commit mode: fetching diff and comments for $COMMIT_SHA..."
        git show "$COMMIT_SHA" > /tmp/commit-diff.txt
        echo "Commit diff saved to /tmp/commit-diff.txt ($(wc -l < /tmp/commit-diff.txt) lines)"
        COMMENTS=$(curl -sS --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
          "${API_URL}/projects/${CI_PROJECT_ID}/repository/commits/${COMMIT_SHA}/comments")
        echo "Classifying commit comments..."
        AI_REVIEWS=$(echo "$COMMENTS" | jq -r '
          .[] | select((.note // "") | contains("<!-- AI_CODE_REVIEW -->"))
          | "- " + .note')
        HUMAN_FEEDBACK=$(echo "$COMMENTS" | jq -r '
          .[] | select((.note // "") | contains("<!-- AI_CODE_REVIEW -->") | not) | select(.note != null and .note != "")
          | "- [" + .author.name + "]: " + .note')
      fi

      echo "AI review notes: $(echo "$AI_REVIEWS" | wc -l) lines"
      echo "Human feedback: $(echo "$HUMAN_FEEDBACK" | wc -l) lines"
      echo "$AI_REVIEWS" > /tmp/ai-reviews.txt
      echo "$HUMAN_FEEDBACK" > /tmp/human-feedback.txt

      if [ -n "$AI_FLOW_MR_IID" ]; then
        CONTEXT_TYPE="MR !${AI_FLOW_MR_IID}"
        DIFF_FILE="/tmp/mr-diff.txt"
      else
        CONTEXT_TYPE="Commit ${AI_FLOW_COMMIT_SHA:0:8}"
        DIFF_FILE="/tmp/commit-diff.txt"
      fi

      sed 's/^      //' > /tmp/claude-prompt.txt <<'EOF'
      User commented on ${AI_FLOW_CONTEXT} (CONTEXT_TYPE_PLACEHOLDER):
      ${AI_FLOW_INPUT}

      ## Code Changes

      Read DIFF_FILE_PLACEHOLDER first to understand the full code changes.

      ## Comment Context

      ### Human Feedback (Highest Priority)
      HUMAN_FEEDBACK_PLACEHOLDER

      ### AI Review Comments (Secondary Priority)
      AI_REVIEWS_PLACEHOLDER

      ## Task Requirements

      1. **Priority Rules**:
         - Human Feedback > AI Review > Current user instruction
         - If human says "skip item X", skip it even if AI review mentions it
         - When conflicts arise, follow human feedback

      2. **Execution Steps**:
         - Read DIFF_FILE_PLACEHOLDER to understand code changes
         - Analyze all comments to understand fix intent
         - Modify code (use Edit/Write tools)
         - Do not run git; the CI job commits and pushes after you exit.

      3. **Important Notes**:
         - Don't fix issues that are already fixed
         - If comments are unclear, be conservative
         - Keep changes minimal and focused

      ## Output language

      LANGUAGE_PLACEHOLDER

      Begin task execution.
      EOF

      python3 - <<'PYEOF'
      import os

      _lang = os.environ.get("CODE_REVIEW_REPORT_LANGUAGE", "zh").strip().lower()
      if _lang.startswith("en"):
          _lang_desc = "English"
      else:
          _lang_desc = "Chinese (Simplified)"

      replacements = {
          'CONTEXT_TYPE_PLACEHOLDER': '''${CONTEXT_TYPE}''',
          'DIFF_FILE_PLACEHOLDER': '''${DIFF_FILE}''',
          'HUMAN_FEEDBACK_PLACEHOLDER': open('/tmp/human-feedback.txt').read(),
          'AI_REVIEWS_PLACEHOLDER': open('/tmp/ai-reviews.txt').read(),
          '${AI_FLOW_CONTEXT}': '''${AI_FLOW_CONTEXT}''',
          '${AI_FLOW_INPUT}': '''${AI_FLOW_INPUT}''',
          'LANGUAGE_PLACEHOLDER': (
              f"**Reply language (CI CODE_REVIEW_REPORT_LANGUAGE={os.environ.get('CODE_REVIEW_REPORT_LANGUAGE', 'zh')}):** "
              f"Write explanations and summaries that will be posted to GitLab in {_lang_desc} only. "
              f"Do not mix languages unless quoting code or identifiers."
          ),
      }

      with open('/tmp/claude-prompt.txt', 'r') as f:
          content = f.read()

      for placeholder, value in replacements.items():
          content = content.replace(placeholder, value)

      with open('/tmp/claude-prompt.txt', 'w') as f:
          f.write(content)
      PYEOF

      cat /tmp/claude-prompt.txt

      claude_assist_post_gitlab() {
        _body="$1"
        # Prefix stops webhook-listener from re-triggering when the reply quotes @claude or # @claude:
        case "$_body" in
          *'<!-- AI_CODE_REVIEW -->'*) _gitlab_body="$_body" ;;
          *)
            if [ -n "${AI_FLOW_AUTHOR_USERNAME:-}" ]; then
              _gitlab_body=$(printf '%s\n@%s\n\n%s' '<!-- AI_CODE_REVIEW -->' "$AI_FLOW_AUTHOR_USERNAME" "$_body")
            else
              _gitlab_body=$(printf '%s\n\n%s' '<!-- AI_CODE_REVIEW -->' "$_body")
            fi
            ;;
        esac
        if [ -n "$AI_FLOW_MR_IID" ]; then
          curl -sS --request POST \
            --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
            --data-urlencode "body=${_gitlab_body}" \
            "${API_URL}/projects/${CI_PROJECT_ID}/merge_requests/${AI_FLOW_MR_IID}/notes"
        else
          curl -sS --request POST \
            --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
            --data-urlencode "note=${_gitlab_body}" \
            "${API_URL}/projects/${CI_PROJECT_ID}/repository/commits/${AI_FLOW_COMMIT_SHA}/comments"
        fi
      }

      claude_assist_send_feishu() {
        _title="$1"
        _button_url="$2"
        _template="$3"
        _reply_body="$4"
        if [ -n "$FEISHU_APP_ID" ] && [ -n "$FEISHU_APP_SECRET" ] && [ -n "$NOTIFY_EMAIL" ]; then
          printf '%s\n' "$_reply_body" > /tmp/claude-feishu-reply.md
          export FEISHU_CARD_MODE=reply
          export FEISHU_CARD_TEMPLATE="${_template}"
          python3 .gitlab/send-feishu.py /tmp/claude-feishu-reply.md "$_title" "$_button_url" "$NOTIFY_EMAIL" || echo "Feishu notification failed" >&2
          unset FEISHU_CARD_MODE FEISHU_CARD_TEMPLATE
        elif [ -z "$FEISHU_APP_ID" ] || [ -z "$FEISHU_APP_SECRET" ]; then
          echo "claude-assist: Feishu skipped (FEISHU_APP_ID or FEISHU_APP_SECRET not set in this job)." >&2
        elif [ -z "$NOTIFY_EMAIL" ]; then
          echo "claude-assist: Feishu skipped (NOTIFY_EMAIL empty)." >&2
        fi
      }

      MAX_RETRIES=2
      for i in $(seq 1 $MAX_RETRIES); do
        echo "Running Claude (attempt $i/$MAX_RETRIES)..."

        PRE_CLAUDE_HEAD=$(git rev-parse HEAD)

        if claude --model $CLAUDE_MODEL \
          --permission-mode acceptEdits \
          --allowedTools "Read Edit Write Grep Glob" \
          --disallowedTools "Bash Agent WebFetch WebSearch" \
          -p < /tmp/claude-prompt.txt | tee /tmp/claude-output.txt; then

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            # Do not put [skip ci] in the commit message — GitLab skips all pipelines for that commit, including MR (mr-review).
            # Push option ci.skip skips branch pipelines only; merge request pipelines still run when the MR is opened/updated.
            git commit -m "fix: apply review suggestions from @claude" || { echo "claude-assist: git commit failed" >&2; exit 1; }
            git push -o ci.skip=true origin "$BRANCH" || { echo "claude-assist: git push failed" >&2; exit 1; }
          fi

          CLAUDE_RESPONSE=$(cat /tmp/claude-output.txt)
          HEAD_AFTER=$(git rev-parse HEAD)
          COMMIT_SHA="$HEAD_AFTER"
          COMMIT_URL="${CI_PROJECT_URL}/commit/${COMMIT_SHA}"

          # Refresh remote ref so origin/BRANCH matches remote after claude push; otherwise
          # "ahead of origin" can be wrong and we mislabel the Feishu card.
          git fetch origin "$BRANCH" 2>/dev/null || true

          POST_WITH_LINK=0
          COMMITS_SINCE_PRE=$(git rev-list --count "${PRE_CLAUDE_HEAD}..${HEAD_AFTER}" 2>/dev/null || echo 0)
          AHEAD_OF_ORIGIN=$(git rev-list --count "origin/${BRANCH}..HEAD" 2>/dev/null || echo 0)
          echo "claude-assist: PRE=${PRE_CLAUDE_HEAD} HEAD=${HEAD_AFTER} commits_since_pre=${COMMITS_SINCE_PRE} ahead_of_origin=${AHEAD_OF_ORIGIN}"

          if [ "${COMMITS_SINCE_PRE:-0}" -gt 0 ] 2>/dev/null; then
            echo "New commit(s) in this job (PRE..HEAD)"
            POST_WITH_LINK=1
          elif [ "${AHEAD_OF_ORIGIN:-0}" -gt 0 ] 2>/dev/null; then
            echo "Branch still ahead of origin/${BRANCH} (unpushed commits)"
            POST_WITH_LINK=1
          elif [ "$PRE_CLAUDE_HEAD" != "$HEAD_AFTER" ]; then
            echo "PRE != HEAD (fallback if rev-list failed, e.g. shallow clone)"
            POST_WITH_LINK=1
          fi

          if [ "$POST_WITH_LINK" = 1 ]; then
            REPLY_BODY=$(printf '%s\n\n%s' "$CLAUDE_RESPONSE" "$COMMIT_URL")
            claude_assist_post_gitlab "$REPLY_BODY"
            claude_assist_send_feishu "$FEISHU_TITLE_PUSHED" "$COMMIT_URL" "green" "$REPLY_BODY"
          else
            echo "No new commit (no changes needed or run failed)"

            if [ -n "$CLAUDE_RESPONSE" ]; then
              REPLY_BODY="$CLAUDE_RESPONSE"
              claude_assist_post_gitlab "$REPLY_BODY"
              claude_assist_send_feishu "$FEISHU_TITLE_OUTPUT_ONLY" "$NOTIFY_URL" "wathet" "$REPLY_BODY"
            fi
          fi

          echo "Task finished"
          break
        else
          if [ $i -lt $MAX_RETRIES ]; then
            echo "Run failed; resetting and retrying..."
            git reset --hard "origin/${BRANCH}"
            git clean -fd
            sleep 5
          else
            echo "Task failed after $MAX_RETRIES attempts"
            exit 1
          fi
        fi
      done

# integration/* push: optional memory-bank refresh
update-memory-bank:
  stage: post-merge
  timeout: 10 minutes
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^integration(\/|-)/ && $CI_PIPELINE_SOURCE == "push"'
  allow_failure: true
  script:
    - |
      echo "update-memory-bank: CI_COMMIT_TITLE=${CI_COMMIT_TITLE:-}"
      which claude >/dev/null 2>&1 || { echo "claude CLI not installed; skipping"; exit 0; }
      [ -z "$GITLAB_API_TOKEN" ] && { echo "GITLAB_API_TOKEN not set; skipping"; exit 0; }

      git config user.name "claude"
      git config user.email "claude@users.noreply.${CI_SERVER_HOST:-gitlab}"
      GIT_URL="$(echo "$CI_PROJECT_URL" | sed 's|https://|http://oauth2:'"${GITLAB_API_TOKEN}"'@|;s|http://|http://oauth2:'"${GITLAB_API_TOKEN}"'@|').git"
      git remote set-url origin "$GIT_URL"

      # Feishu: prefer MR author email (same idea as mr-review). IID from commit-linked MRs, else merged-list match.
      MB_MR_IID=""
      MB_NOTIFY_EMAIL="${AI_FLOW_AUTHOR_EMAIL:-}"
      if [ -n "$GITLAB_API_TOKEN" ]; then
        MR_REL=$(curl -sS --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
          "${API_URL}/projects/${CI_PROJECT_ID}/repository/commits/${CI_COMMIT_SHA}/merge_requests" 2>/dev/null || true)
        MB_MR_IID=$(printf '%s' "$MR_REL" | jq -r 'if type == "array" then (.[0].iid // empty) else empty end' 2>/dev/null || true)
        if [ -z "$MB_MR_IID" ]; then
          MB_MR_IID=$(curl -sS --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
            "${API_URL}/projects/${CI_PROJECT_ID}/merge_requests?state=merged&order_by=updated_at" | \
            jq -r --arg sha "$CI_COMMIT_SHA" '.[] | select(.merge_commit_sha == $sha) | .iid' 2>/dev/null | head -1)
        fi
      fi
      if [ -z "$MB_NOTIFY_EMAIL" ] && [ -n "$MB_MR_IID" ] && [ -n "$GITLAB_API_TOKEN" ]; then
        MR_JSON=$(curl -sS --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
          "${API_URL}/projects/${CI_PROJECT_ID}/merge_requests/${MB_MR_IID}" 2>/dev/null || true)
        AUTHOR_ID_MR=$(printf '%s' "$MR_JSON" | python3 -c "import sys,json;d=json.load(sys.stdin);print((d.get('author') or {}).get('id') or '')" 2>/dev/null || true)
        if [ -n "$AUTHOR_ID_MR" ]; then
          USER_JSON=$(curl -sS --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
            "${API_URL}/users/${AUTHOR_ID_MR}" 2>/dev/null || true)
          MB_NOTIFY_EMAIL=$(printf '%s' "$USER_JSON" | python3 -c "import sys,json;d=json.load(sys.stdin);print((d.get('public_email') or d.get('email') or '').strip())" 2>/dev/null || true)
        fi
        if [ -n "$MB_NOTIFY_EMAIL" ]; then
          echo "update-memory-bank: Feishu notify email = MR author (MR !${MB_MR_IID}, GitLab user id ${AUTHOR_ID_MR})" >&2
        else
          echo "update-memory-bank: MR author has no public_email/email in GitLab profile; will try fallbacks" >&2
        fi
      fi
      if [ -z "$MB_NOTIFY_EMAIL" ]; then
        MB_NOTIFY_EMAIL=$(echo "${CI_COMMIT_AUTHOR:-}" | sed -n 's/.*<\([^>]*\)>.*/\1/p')
      fi
      if [ -z "$MB_NOTIFY_EMAIL" ]; then
        MB_NOTIFY_EMAIL=$(git log -1 --pretty=format:'%ae' HEAD 2>/dev/null || true)
      fi
      if [ -z "$MB_NOTIFY_EMAIL" ]; then
        MB_NOTIFY_EMAIL="${FEISHU_DEFAULT_NOTIFY_EMAIL:-}"
      fi
      if [ -z "$MB_NOTIFY_EMAIL" ]; then
        echo "update-memory-bank: MB_NOTIFY_EMAIL empty — Feishu DMs skipped. MR author profile has no email; set FEISHU_DEFAULT_NOTIFY_EMAIL or AI_FLOW_AUTHOR_EMAIL." >&2
      fi

      # @ push user (integration); fallback merged_by when GITLAB_USER_LOGIN empty (e.g. some bot merges).
      MB_MENTION_USERNAME="${GITLAB_USER_LOGIN:-}"
      if [ -z "$MB_MENTION_USERNAME" ] && [ -n "$MB_MR_IID" ] && [ -n "$GITLAB_API_TOKEN" ]; then
        MB_MR_JSON_MERGER=$(curl -sS --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
          "${API_URL}/projects/${CI_PROJECT_ID}/merge_requests/${MB_MR_IID}" 2>/dev/null || true)
        MB_MENTION_USERNAME=$(printf '%s' "$MB_MR_JSON_MERGER" | python3 -c "import sys,json;d=json.load(sys.stdin);m=d.get('merged_by') or {};print(m.get('username') or '')" 2>/dev/null || true)
      fi

      mb_post_mr_note() {
        _iid="$1"
        _body="$2"
        _mention="${3:-}"
        # Same marker as feature-review / mr-review / claude_assist_post_gitlab (webhook ignores re-trigger).
        case "$_body" in
          *'<!-- AI_CODE_REVIEW -->'*) _gitlab_body="$_body" ;;
          *)
            if [ -n "$_mention" ]; then
              _gitlab_body=$(printf '%s\n@%s\n\n%s' '<!-- AI_CODE_REVIEW -->' "$_mention" "$_body")
            else
              _gitlab_body=$(printf '%s\n\n%s' '<!-- AI_CODE_REVIEW -->' "$_body")
            fi
            ;;
        esac
        curl -sS --request POST \
          --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
          --data-urlencode "body=${_gitlab_body}" \
          "${API_URL}/projects/${CI_PROJECT_ID}/merge_requests/${_iid}/notes"
      }

      mb_send_feishu() {
        _title="$1"
        _button_url="$2"
        _template="$3"
        _reply_body="$4"
        if [ -n "$FEISHU_APP_ID" ] && [ -n "$FEISHU_APP_SECRET" ] && [ -n "$MB_NOTIFY_EMAIL" ]; then
          printf '%s\n' "$_reply_body" > /tmp/memory-bank-feishu-reply.md
          export FEISHU_CARD_MODE=reply
          export FEISHU_CARD_TEMPLATE="${_template}"
          python3 .gitlab/send-feishu.py /tmp/memory-bank-feishu-reply.md "$_title" "$_button_url" "$MB_NOTIFY_EMAIL" || echo "Feishu notification failed" >&2
          unset FEISHU_CARD_MODE FEISHU_CARD_TEMPLATE
        fi
      }

      REPORT_LANG="${CODE_REVIEW_REPORT_LANGUAGE:-zh}"
      case "$REPORT_LANG" in
        en|en_*|EN*)
          LANG_DESC="English"
          MB_TITLE_PUSHED="Memory bank: updated"
          MB_TITLE_OUTPUT_ONLY="Memory bank: no update needed"
          ;;
        *)
          LANG_DESC="Chinese (Simplified)"
          MB_TITLE_PUSHED="Memory bank：已更新"
          MB_TITLE_OUTPUT_ONLY="Memory bank：无需更新"
          ;;
      esac

      # Same language line as claude-assist (LANGUAGE_PLACEHOLDER in .gitlab-ci.yml); stdout goes to MR + Feishu.
      printf '%s\n' \
        "update memory bank." \
        "" \
        "## Output language" \
        "" \
        "**Reply language (CI CODE_REVIEW_REPORT_LANGUAGE=${REPORT_LANG}):** Write explanations and summaries that will be posted to GitLab and Feishu in ${LANG_DESC} only. Do not mix languages unless quoting code or identifiers." \
        "" \
        "Apply edits under memory-bank/ as needed. Your stdout will be posted to the merge request when the job finishes." \
        > /tmp/memory-bank-prompt.txt

      claude --model $CLAUDE_MODEL \
        --permission-mode acceptEdits \
        --disallowedTools "Bash" \
        -p < /tmp/memory-bank-prompt.txt | tee /tmp/claude-output.txt

      CLAUDE_RESPONSE=$(cat /tmp/claude-output.txt)

      if ! git diff --quiet memory-bank/; then
        git add memory-bank/
        git commit -m "chore: auto-update memory bank [skip ci]"
        git push origin "HEAD:${CI_COMMIT_BRANCH}"

        COMMIT_SHA=$(git rev-parse HEAD)
        COMMIT_URL="${CI_PROJECT_URL}/commit/${COMMIT_SHA}"
        REPLY_BODY=$(printf '%s\n\n%s' "$CLAUDE_RESPONSE" "$COMMIT_URL")

        if [ -n "$MB_MR_IID" ]; then
          mb_post_mr_note "$MB_MR_IID" "$REPLY_BODY" "$MB_MENTION_USERNAME"
          mb_send_feishu "$MB_TITLE_PUSHED" "$COMMIT_URL" "green" "$REPLY_BODY"
        fi

        echo "memory-bank pushed to ${CI_COMMIT_BRANCH}"
      else
        echo "No memory-bank changes"

        if [ -n "$CLAUDE_RESPONSE" ] && [ -n "$MB_MR_IID" ]; then
          REPLY_BODY="$CLAUDE_RESPONSE"
          MR_PAGE_URL="${CI_PROJECT_URL}/merge_requests/${MB_MR_IID}"
          mb_post_mr_note "$MB_MR_IID" "$REPLY_BODY" "$MB_MENTION_USERNAME"
          mb_send_feishu "$MB_TITLE_OUTPUT_ONLY" "$MR_PAGE_URL" "wathet" "$REPLY_BODY"
        fi
      fi
